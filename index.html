<script>
/* ═══════════════════════════════════════════
 GLOBAL STATE & SECURE BACKEND ROUTING
═══════════════════════════════════════════ */
let allBills = []; 
let currentBillId = null;
let items = [];
let autoSaveTimer = null;

// Download all bills securely via our backend proxy
async function fetchBillsFromCloud() {
  showSaveStatus('Downloading shared data…');
  try {
    const res = await fetch('/api/bills', { method: "GET" });
    const data = await res.json();
    if (res.ok && Array.isArray(data)) {
      allBills = data;
      showSaveStatus('✓ Database Synced');
    } else {
      showSaveStatus('⚠️ Sync Error');
    }
  } catch (e) {
    showSaveStatus('⚠️ Fetch Offline');
  }
  renderDashboard();
}

// Upload the entire updated array via our backend proxy
async function uploadBillsToCloud() {
  try {
    const res = await fetch('/api/bills', {
      method: "PUT",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(allBills)
    });
    if (res.ok) {
      showSaveStatus('✓ Cloud Saved');
    } else {
      showSaveStatus('⚠️ Save Failed');
    }
  } catch (e) {
    showSaveStatus('⚠️ Offline Mode');
  }
}

function getBillById(id){
 return allBills.find(b=>b.id===id)||null;
}
function genId(){
 return 'bill_'+Date.now()+'_'+Math.random().toString(36).slice(2,7);
}

/* ═══════════════════════════════════════════
 NAVIGATION
═══════════════════════════════════════════ */
function showPage(page){
 document.getElementById('dashPage').classList.toggle('hidden', page!=='dash');
 document.getElementById('editorPage').classList.toggle('hidden', page!=='editor');
 if(page==='dash') renderDashboard();
}
function goToDashboard(){ 
  fetchBillsFromCloud();
  showPage('dash'); 
}

/* ═══════════════════════════════════════════
 DASHBOARD RENDERING
═══════════════════════════════════════════ */
function fmtINR(n){
 return '₹'+(Math.round((n+Number.EPSILON)*100)/100).toLocaleString('en-IN',{minimumFractionDigits:0,maximumFractionDigits:0});
}
function renderDashboard(){
 const q = (document.getElementById('searchInput').value||'').toLowerCase();
 let bills = [...allBills];

 const now = new Date();
 const thisMonth = bills.filter(b=>{
 if(!b.invoiceDate) return false;
 const [d,m,y] = b.invoiceDate.split('/');
 return parseInt(m)===now.getMonth()+1 && parseInt(y)===now.getFullYear();
 });
 const totalRev = bills.reduce((s,b)=>s+(b.grandTotal||0),0);
 const totalPend = bills.reduce((s,b)=>s+(b.balance||0),0);

 document.getElementById('statTotal').textContent = bills.length;
 document.getElementById('statMonth').textContent = thisMonth.length;
 document.getElementById('statRevenue').textContent = fmtINR(totalRev);
 document.getElementById('statPending').textContent = fmtINR(totalPend);

 if(q){
 bills = bills.filter(b=>
 (b.customerName||'').toLowerCase().includes(q)||
 (b.invoiceNo||'').toLowerCase().includes(q)||
 (b.grandTotal||'').toString().includes(q)||
 (b.invoiceDate||'').includes(q)
 );
 }

 const grid = document.getElementById('billsGrid');
 const noBills = document.getElementById('noBills');

 if(!bills.length){
 grid.innerHTML='';
 noBills.classList.remove('hidden');
 return;
 }
 noBills.classList.add('hidden');

 grid.innerHTML = bills.map(b=>{
 const pm = b.paymentMode||'Cash';
 const badgeCls = pm==='Cash'?'cash':pm==='Credit'?'credit':pm==='UPI'?'upi':'';
 return `
 <div class="bill-card">
 <div class="bill-card-top">
 <span class="bill-inv">Invoice #${b.invoiceNo||'—'}</span>
 <span class="bill-date">${b.invoiceDate||'—'}</span>
 </div>
 <div class="bill-customer">${b.customerName||'Unknown Customer'}</div>
 <div class="bill-amount">₹${(b.grandTotal||0).toLocaleString('en-IN',{minimumFractionDigits:2,maximumFractionDigits:2})}</div>
 <div class="bill-meta">
 <span class="badge ${badgeCls}">${pm}</span>
 ${b.balance>0?`<span class="badge credit">Balance ₹${(b.balance||0).toLocaleString('en-IN',{minimumFractionDigits:0})}</span>`:'<span class="badge cash">Paid</span>'}
 <span class="badge">${(b.items||[]).length} items</span>
 </div>
 <div class="bill-card-actions">
 <button class="btn btn-primary btn-sm" onclick="editBill('${b.id}')">✏️ Edit</button>
 <button class="btn btn-secondary btn-sm" onclick="printBill('${b.id}')">🖨️ Print</button>
 <button class="btn btn-danger btn-sm" onclick="confirmDelete('${b.id}')">🗑</button>
 </div>
 </div>`;
 }).join('');
}

function confirmDelete(id){
 const bill = getBillById(id);
 if(!bill) return;
 if(!confirm(`Delete Invoice #${bill.invoiceNo} for ${bill.customerName}?\nThis removes it for everyone.`)) return;
 allBills = allBills.filter(b=>b.id!==id);
 uploadBillsToCloud();
 renderDashboard();
}

/* ═══════════════════════════════════════════

═══════════════════════════════════════════ */

 });

function editBill(id){
 currentBillId = id;
 const bill = getBillById(id);
 if(!bill){ alert('Bill not found'); return; }
 items = (bill.items||[]).map(i=>({...i}));
 showPage('editor');
 resetEditorFields(bill);
 document.getElementById('paymentMode').value = bill.paymentMode||'Cash';
 syncPaymentModePrint();
 renderItems();

}

function printBill(id){

 setTimeout(()=>{ printAndSave(); }, 400);
}

 setDS('sellerPhone', data.sellerPhone||'7989088940');
 setDS('sellerEmail', data.sellerEmail||'radhavudathu1971@gmail.com');
 set('sellerGstin', data.sellerGstin||'37AJKPV2937N1ZB');
 set('sellerState', data.sellerState||'37-Andhra Pradesh');
 set('invoiceNo', data.invoiceNo||'1');
 set('invoiceDate', data.invoiceDate||'');
 set('ewayBill', data.ewayBill||'');
 set('vanNo', data.vanNo||'');
 set('placeOfSupply', data.placeOfSupply||'37-Andhra Pradesh');
 setDS('customerName', data.customerName||'Customer Name');
 setDS('customerAddr', data.customerAddr||'Customer Address');

/* ═══════════════════════════════════════════
 SHARED AUTO-SAVE LOGIC
═══════════════════════════════════════════ */
function collectBillData(){
 const getT = (id)=>{ const e=document.getElementById(id); return e?e.textContent.trim():''; };
 const getDS = (ds)=>{ const e=document.querySelector(`[data-save="${ds}"]`); return e?e.textContent.trim():''; };
 const total = parseFloat(document.getElementById('grandTotal').textContent.replace(/,/g,''))||0;
 const recv = parseFloat(getT('received').replace(/,/g,''))||0;

 return {
 id: currentBillId,
 savedAt: new Date().toISOString(),
 titleBar: getDS('titleBar'),
 sellerName: getDS('sellerName'),
 sellerAddr: getDS('sellerAddr'),
 sellerPhone: getDS('sellerPhone'),
 sellerEmail: getDS('sellerEmail'),
 sellerGstin: getT('sellerGstin'),
 sellerState: getT('sellerState'),
 invoiceNo: getT('invoiceNo'),
 invoiceDate: getT('invoiceDate'),
 ewayBill: getT('ewayBill'),
 vanNo: getT('vanNo'),
 placeOfSupply: getT('placeOfSupply'),
 paymentMode: document.getElementById('paymentMode').value,
 customerName: getDS('customerName'),
 customerAddr: getDS('customerAddr'),
 billToState: getT('billToState'),
 billToGstin: getT('billToGstin'),
 received: getT('received'),
 terms: getDS('terms'),
 forLabel: getDS('forLabel'),
 signature: getDS('signature'),
 items: items.map(i=>({...i})),
 grandTotal: total,
 balance: Math.max(0, total - recv)
 };
}

function autoSave(){
 if(!currentBillId) return;
 clearTimeout(autoSaveTimer);
 showSaveStatus('Staging data locally…');
 
 const bill = collectBillData();
 const idx = allBills.findIndex(b=>b.id===bill.id);
 if(idx>=0) allBills[idx]=bill; else allBills.unshift(bill);

 autoSaveTimer = setTimeout(async ()=>{
  showSaveStatus('Pushing live updates to cloud…');
  await uploadBillsToCloud();
 }, 1500); 
}

function showSaveStatus(msg){
 const el = document.getElementById('saveStatus');
 if(el) el.textContent = msg;
}

/* ═══════════════════════════════════════════
 PRINT + AUTOMATIC SYNC
═══════════════════════════════════════════ */
async function printAndSave(){
 const ewayVal = (document.getElementById('ewayBill').textContent||'').trim();
 const vanVal = (document.getElementById('vanNo').textContent||'').trim();
 const ewayRow = document.getElementById('ewayRow');
 const vanRow = document.getElementById('vanRow');
 if(!ewayVal) ewayRow.classList.add('hide-if-empty-print');
 if(!vanVal) vanRow.classList.add('hide-if-empty-print');

 if(currentBillId){
   showSaveStatus('Syncing final changes to team database...');
   const bill = collectBillData();
   const idx = allBills.findIndex(b=>b.id===bill.id);
   if(idx>=0) allBills[idx]=bill; else allBills.unshift(bill);
   await uploadBillsToCloud(); 
 }
 
 window.print();

 setTimeout(()=>{
 ewayRow.classList.remove('hide-if-empty-print');
 vanRow.classList.remove('hide-if-empty-print');
 }, 2000);
}

function deleteCurrent(){
 if(!currentBillId) return;
 if(!confirm(`Delete this bill entirely? This cannot be undone.`)) return;
 allBills = allBills.filter(b=>b.id!==currentBillId);
 uploadBillsToCloud();
 currentBillId = null;
 showPage('dash');
}

/* ═══════════════════════════════════════════
 ITEMS TABLE
═══════════════════════════════════════════ */
const fmt = n=>(Math.round((n+Number.EPSILON)*100)/100).toLocaleString('en-IN',{minimumFractionDigits:2,maximumFractionDigits:2});

function lineAmounts(it){
 const taxable=it.qty*it.price;
 const gst=taxable*(it.gstPct/100);
 return{taxable,gst,amount:taxable+gst};
}

function renderItems(){
 const body=document.getElementById('itemsBody');
 body.innerHTML='';
 items.forEach((it,idx)=>{
 const{gst,amount}=lineAmounts(it);
 const tr=document.createElement('tr');
 tr.dataset.idx=idx;
 tr.innerHTML=`
 <td>${idx+1}</td>
 <td contenteditable="true" data-field="name">${it.name}</td>
 <td contenteditable="true" data-field="hsn">${it.hsn}</td>
 <td class="num" contenteditable="true" data-field="qty">${it.qty}</td>
 <td class="center" contenteditable="true" data-field="unit">${it.unit}</td>
 <td class="num" contenteditable="true" data-field="price">${fmt(it.price)}</td>
 <td class="num">₹${fmt(gst)} (<span contenteditable="true" data-field="gstPct" class="gst-rate-edit">${it.gstPct}</span>%)</td>
 <td class="num">₹${fmt(amount)}</td>
 <td class="del-cell"><button class="row-del" onclick="deleteRow(${idx})">✕</button></td>`;
 body.appendChild(tr);
 });
 attachEditListeners();
 recalcAll();
}

function attachEditListeners(){
 document.querySelectorAll('#itemsBody [contenteditable]').forEach(cell=>{
 cell.removeEventListener('blur',onCellBlur);
 cell.addEventListener('blur',onCellBlur);
 cell.removeEventListener('keydown',onCellKeydown);
 cell.addEventListener('keydown',onCellKeydown);
 });
}
function onCellKeydown(e){ if(e.key==='Enter'){e.preventDefault();e.target.blur();} }
function onCellBlur(e){
 const cell=e.target,tr=cell.closest('tr');
 if(!tr) return;
 const idx=parseInt(tr.dataset.idx,10),field=cell.dataset.field;
 if(!field) return;
 let val=cell.textContent.trim();
 if(['qty','price','gstPct'].includes(field)) val=parseFloat(val.replace(/,/g,''))||0;
 items[idx][field]=val;
 renderItems();
}
function addItemRow(){
 items.push({name:'New Item',hsn:'',qty:1,unit:'Kg',price:0,gstPct:5});
 renderItems();
}
function deleteRow(idx){ items.splice(idx,1); renderItems(); }

/* ═══════════════════════════════════════════
 RECALC TOTALS
═══════════════════════════════════════════ */
function recalcAll(){
 let totQty=0,totGst=0,totAmt=0;
 const byHsn={};
 items.forEach(it=>{
 const{taxable,gst,amount}=lineAmounts(it);
 totQty+=Number(it.qty)||0; totGst+=gst; totAmt+=amount;
 const key=(it.hsn||'—')+'|'+it.gstPct;
 if(!byHsn[key]) byHsn[key]={hsn:it.hsn||'—',gstPct:it.gstPct,taxable:0,gst:0};
 byHsn[key].taxable+=taxable; byHsn[key].gst+=gst;
 });
 document.getElementById('totQty').textContent=totQty;
 document.getElementById('totGst').textContent='₹'+fmt(totGst);
 document.getElementById('totAmt').textContent='₹'+fmt(totAmt);
 document.getElementById('subTotal').textContent=fmt(totAmt);
 document.getElementById('grandTotal').textContent=fmt(totAmt);
 const recv=parseFloat((document.getElementById('received').textContent||'0').replace(/,/g,''))||0;
 document.getElementById('balance').textContent=fmt(Math.max(0,totAmt-recv));
 document.getElementById('amtWords').textContent=' ('+numberToWordsRupees(Math.round(totAmt))+' only)';

 const tb=document.getElementById('taxBreakBody');
 tb.innerHTML='';
 let ttax=0,tCgst=0,tSgst=0,tTax=0;
 Object.keys(byHsn).sort().forEach(k=>{
 const r=byHsn[k],hr=r.gstPct/2,ha=r.gst/2;
 ttax+=r.taxable; tCgst+=ha; tSgst+=ha; tTax+=r.gst;
 const tr=document.createElement('tr');
 tr.innerHTML=`<td class="left">${r.hsn}</td><td>${fmt(r.taxable)}</td><td class="center">${hr}</td><td>${fmt(ha)}</td><td class="center">${hr}</td><td>${fmt(ha)}</td><td>${fmt(r.gst)}</td>`;
 tb.appendChild(tr);
 });
 document.getElementById('tbTaxableTotal').textContent=fmt(ttax);
 document.getElementById('tbCgstAmtTotal').textContent=fmt(tCgst);
 document.getElementById('tbSgstAmtTotal').textContent=fmt(tSgst);
 document.getElementById('tbTaxTotal').textContent=fmt(tTax);

 autoSave();
}

document.getElementById('received').addEventListener('input',recalcAll);
document.getElementById('received').addEventListener('blur',recalcAll);

/* ═══════════════════════════════════════════
 AUTO-SAVE EVENT LISTENERS

document.getElementById('invoicePage').addEventListener('input', e=>{

/* ═══════════════════════════════════════════
 NUMBER TO WORDS
═══════════════════════════════════════════ */
function numberToWordsRupees(num){
 if(num===0) return 'Zero Rupees';
 const ones=['','One','Two','Three','Four','Five','Six','Seven','Eight','Nine','Ten','Eleven','Twelve','Thirteen','Fourteen','Fifteen','Sixteen','Seventeen','Eighteen','Nineteen'];
 const tens=['','','Twenty','Thirty','Forty','Fifty','Sixty','Seventy','Eighty','Ninety'];
 function two(n){ return n<20?ones[n]:tens[Math.floor(n/10)]+(n%10?' '+ones[n%10]:''); }
 function three(n){ return n>=100?ones[Math.floor(n/100)]+' Hundred'+(n%100?' '+two(n%100):''):two(n); }
 const cr=Math.floor(num/10000000),lk=Math.floor((num%10000000)/100000),th=Math.floor((num%100000)/1000),hu=num%1000;
 const p=[];
 if(cr) p.push(three(cr)+' Crore');
 if(lk) p.push(three(lk)+' Lakh');
 if(th) p.push(three(th)+' Thousand');
 if(hu) p.push(three(hu));
 return p.join(' ')+' Rupees';
}

/* ═══════════════════════════════════════════
 GSTIN AUTOFILL
═══════════════════════════════════════════ */
const GST_CODES={'01':'Jammu and Kashmir','02':'Himachal Pradesh','03':'Punjab','04':'Chandigarh','05':'Uttarakhand','06':'Haryana','07':'Delhi','08':'Rajasthan','09':'Uttar Pradesh','10':'Bihar','11':'Sikkim','12':'Arunachal Pradesh','13':'Nagaland','14':'Manipur','15':'Mizoram','16':'Tripura','17':'Meghalaya','18':'Assam','19':'West Bengal','20':'Jharkhand','21':'Odisha','22':'Chhattisgarh','23':'Madhya Pradesh','24':'Gujarat','26':'Dadra and Nagar Haveli and Daman and Diu','27':'Maharashtra','28':'Andhra Pradesh (Old)','29':'Karnataka','30':'Goa','31':'Lakshadweep','32':'Kerala','33':'Tamil Nadu','34':'Puducherry','35':'Andaman and Nicobar Islands','36':'Telangana','37':'Andhra Pradesh','38':'Ladakh','97':'Other Territory','99':'Centre Jurisdiction'};

function gstinToState(g){ const c=(g||'').trim().substring(0,2); return /^\d{2}$/.test(c)&&GST_CODES[c]?c+'-'+GST_CODES[c]:null; }

function wireGstinState(gstinId,stateId){
 const g=document.getElementById(gstinId),s=document.getElementById(stateId);
 if(!g||!s) return;
 const fill=()=>{ const r=gstinToState(g.textContent); if(r) s.textContent=r; };
 g.addEventListener('input',fill); g.addEventListener('blur',fill);
}
wireGstinState('sellerGstin','sellerState');
wireGstinState('billToGstin','billToState');
wireGstinState('billToGstin','placeOfSupply');

/* Live API lookup */
const GSTINCHECK_API_KEY='b217fc26c1f6checksume8bc30d52eb18f35';
const GSTIN_REGEX=/^[0-9]{2}[A-Z]{5}[0-9]{4}[A-Z][1-9A-Z]Z[0-9A-Z]$/;
async function lookupGstin(gstin,type){
 const g=gstin.trim().toUpperCase();
 if(!GSTIN_REGEX.test(g)) return;
 try{
 const res=await fetch(`https://sheet.gstincheck.co.in/check/${GSTINCHECK_API_KEY}/${g}`);
 const json=await res.json();
 const rec=json?.data?.data||json?.data||json?.taxpayerInfo||json;
 if(!rec||json.flag===false||json.error) return;
 const name=rec.tradeNam||rec.lgnm||rec.tradeName||rec.legal_name;
 const addr=rec.pradr?.addr||rec.address||rec.adr;
 if(type==='billTo'){
 if(name) document.querySelector('.bill-to .customer-name').textContent=name;
 if(addr){
 const ap=[addr.bno,addr.flno,addr.bnm,addr.st,addr.loc,addr.dst].filter(Boolean).join(', ');
 if(ap) document.querySelector('.bill-to .addr-line').textContent=ap;
 }
 }
 }catch(e){}
}
document.getElementById('billToGstin').addEventListener('blur',e=>lookupGstin(e.target.textContent,'billTo'));
document.getElementById('sellerGstin').addEventListener('blur',e=>lookupGstin(e.target.textContent,'seller'));
